# One-shot wiring check for the relayer deploy pipeline (#72):
# 1Password service account -> nido_fly_io vault -> Fly API token -> flyctl auth.
# Public repo: never print secret values or account identities; statuses only.
# Subsumed by deploy-relayer.yml once the real deploy workflow lands.
name: relayer-secrets-check

on:
  push:
    branches: [feat/72-relayer-gas-abstraction]
    paths: ['.github/workflows/relayer-secrets-check.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install 1Password CLI
        run: |
          set -euo pipefail
          curl -sSfo /tmp/op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v2.34.0/op_linux_amd64_v2.34.0.zip"
          unzip -oq /tmp/op.zip -d /tmp/opcli
          sudo mv /tmp/opcli/op /usr/local/bin/op
          op --version

      - name: Locate Fly token in 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${OP_SERVICE_ACCOUNT_TOKEN}" ]; then
            echo "::error::OP_SERVICE_ACCOUNT_TOKEN secret is empty or unavailable"
            exit 1
          fi

          VAULTS_JSON=$(op vault list --format json)
          echo "service account sees $(echo "$VAULTS_JSON" | jq length) vault(s): $(echo "$VAULTS_JSON" | jq -r '[.[].name] | join(", ")')"

          VAULT=$(echo "$VAULTS_JSON" | jq -r '[.[] | select(.name | ascii_downcase | test("fly"))][0].name // empty')
          if [ -z "$VAULT" ]; then
            VAULT=$(echo "$VAULTS_JSON" | jq -r '.[0].name // empty')
          fi
          if [ -z "$VAULT" ]; then
            echo "::error::service account has access to no vaults"
            exit 1
          fi
          echo "using vault: $VAULT"

          ITEMS_JSON=$(op item list --vault "$VAULT" --format json)
          echo "vault contains $(echo "$ITEMS_JSON" | jq length) item(s): $(echo "$ITEMS_JSON" | jq -r '[.[].title] | join(", ")')"

          TOKEN=""
          REF=""
          for id in $(echo "$ITEMS_JSON" | jq -r '.[].id'); do
            ITEM_JSON=$(op item get "$id" --format json 2>/dev/null || true)
            if [ -z "$ITEM_JSON" ] || [ "$(echo "$ITEM_JSON" | jq -r '.fields // empty | length')" = "0" ]; then
              ITEM_JSON=$(op item get "$id" --reveal --format json 2>/dev/null || true)
            fi
            FIELD=$(echo "$ITEM_JSON" | jq -r '[.fields[]? | select(.value != null and .value != "") | select(((.label // "") | ascii_downcase | test("token|credential|password|secret|api")) or .id == "credential" or .purpose == "PASSWORD")][0] // empty | if . == "" then "" else @json end')
            if [ -n "$FIELD" ]; then
              TOKEN=$(echo "$FIELD" | jq -r 'fromjson | .value')
              TITLE=$(echo "$ITEM_JSON" | jq -r '.title')
              LABEL=$(echo "$FIELD" | jq -r 'fromjson | .label // .id')
              REF="op://$VAULT/$TITLE/$LABEL"
              break
            fi
          done

          if [ -z "$TOKEN" ]; then
            echo "::error::no credential-like field found on any item in vault '$VAULT'"
            exit 1
          fi

          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$TOKEN"

          echo "found credential field -> secret reference for deploy workflow: $REF"
          {
            echo "FLY_API_TOKEN<<G2C_EOF_TOKEN"
            echo "$TOKEN"
            echo "G2C_EOF_TOKEN"
          } >> "$GITHUB_ENV"

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly token against Fly API
        run: |
          set -euo pipefail
          if OUT=$(flyctl auth whoami 2>&1); then
            echo "flyctl auth whoami: OK (identity withheld from public log)"
          elif OUT=$(flyctl apps list 2>&1); then
            echo "flyctl auth whoami unavailable (likely a scoped deploy token), but flyctl apps list: OK"
          else
            echo "::error::Fly token failed to authenticate"
            echo "$OUT" | tail -3
            exit 1
          fi
          echo "--- orgs visible to this token ---"
          flyctl orgs list 2>&1 || echo "(orgs list not permitted for this token scope — fine for app-scoped deploy tokens)"

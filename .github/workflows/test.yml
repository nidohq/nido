name: Tests

on:
  pull_request:
  push:
    branches: [main]
  # Lets the `zk-circuit-repro` job (see its `if:` below) be run on-demand from
  # the Actions tab. It is intentionally NOT a pull_request/push gate -- see
  # that job's comment for why.
  workflow_dispatch:

jobs:
  contracts:
    name: Contracts (cargo test --workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No rust-toolchain.toml pin in this repo -- `stable` matches local dev.
      # `wasm32v1-none` is the target `just build-contracts`/`cargo build
      # --target wasm32v1-none` compiles the contract wasms for.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: contracts

      # Fast, prebuilt-binary install (no compile-from-source).
      - name: Install just
        uses: taiki-e/install-action@just

      # `stellar-cli` (binary `stellar`) and `stellar-scaffold-cli` (binary
      # `stellar-scaffold`) aren't available as prebuilt actions, so build
      # them from crates.io. Cached separately from the cargo
      # registry/target cache above (keyed only on tool name, not
      # Cargo.lock) so a workspace dependency bump doesn't force
      # re-installing these.
      - name: Cache Stellar CLI + stellar-scaffold binaries
        id: stellar-tools-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/stellar
            ~/.cargo/bin/stellar-scaffold
          key: ${{ runner.os }}-stellar-cli-tools-v1

      - name: Install Stellar CLI + stellar-scaffold
        if: steps.stellar-tools-cache.outputs.cache-hit != 'true'
        # `just build-contracts` (below) runs `stellar-scaffold build` then
        # `stellar contract optimize` -- the CLIs providing those binaries.
        run: |
          # stellar-cli v27's hardware-wallet support pulls `libdbus-sys`
          # (dbus-secret-service) and `hidapi` (Ledger), whose build.rs's panic
          # unless the system dbus + udev dev headers + pkg-config are present.
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
          cargo install --locked stellar-cli
          cargo install --locked stellar-scaffold-cli

      # Topologically builds every contract wasm (smart-account before the
      # factory, whose build.rs embeds the current smart-account wasm), then
      # optimizes them -- see the recipe's comments in `justfile` for why
      # smart-account is optimized and factory is rebuilt BEFORE the final
      # optimize pass (a stale pre-optimize embed otherwise silently desyncs
      # the factory's internally-computed wasm hash from the final,
      # post-optimize wasm every other consumer reads).
      - name: Build contract wasms
        run: just build-contracts

      - name: Check vendored UltraHonk verifier hasn't drifted
        run: just check-vendor-drift

      # Runs the whole Rust workspace, including the M0/M1/M2 real-proof ZK
      # integration tests (crates/integration-tests, crates/zk-bench,
      # contracts/*) -- the committed bb proof/vk/public-inputs fixtures
      # under crates/integration-tests/fixtures/zk/ mean no bb/Docker/Noir
      # toolchain is needed here; the cost-gate tests
      # (bench-zk/bench-zk-initiate/bench-zk-guard) raise their own live
      # budget in-process (see their module docs) rather than depending on
      # any CI-specific configuration.
      # Exclude the vendored UltraHonk verifier crate: its upstream tests read
      # fixture files we don't vendor ("No such file or directory" on a clean
      # checkout). nido exercises the verifier through its own integration
      # tests (crates/integration-tests), which run here.
      - name: cargo test --workspace
        run: cargo test --workspace --exclude ultrahonk_soroban_verifier

      # Gate A (Task 7): the same cost-gate tests above already run as part of
      # `cargo test --workspace` (see that step's comment), so these steps
      # don't add new coverage -- they re-run each gate as its own NAMED step
      # so a budget regression shows up as e.g. "Bench: verify_proof cost
      # budget (bench-zk)" failing in the Checks tab, rather than being buried
      # inside a single "cargo test --workspace" line that a reviewer has to
      # dig through the log to attribute. All three run off the committed
      # fixtures under crates/integration-tests/fixtures/zk/ (no bb/Noir/Docker
      # needed) and reuse the wasm target + stellar-cli/stellar-scaffold
      # already installed above in this job.
      - name: "Bench: verify_proof cost budget (bench-zk, <=250M CPU)"
        run: just bench-zk

      - name: "Bench: initiate_recovery cost budget (bench-zk-initiate, <=350M CPU)"
        run: just bench-zk-initiate

      - name: "Bench: guard cross-call cost budget (bench-zk-guard, <=10M CPU)"
        run: just bench-zk-guard

  unit:
    name: Unit (TestAuthenticator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Unit tests (shim crypto vs SDK parsers)
        run: npx vitest run --config vitest.support.config.ts

  e2e:
    name: E2E (fast UI + CDP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers + system deps
        run: npx playwright install --with-deps chromium firefox webkit
      # Mirrors the deploy/preview workflows: build the SDK, then the frontend,
      # so the static webServer serves a real dist for the e2e tiers.
      - name: Build passkey-sdk
        run: npx tsc -p ./packages/passkey-sdk/tsconfig.json
      - name: Build frontend
        run: npx astro build --root ./packages/frontend
      - name: Build adsum's generated contract-client packages
        run: npm run build -w petitions -w web_of_trust
      # examples/adsum/dist is gitignored and never built as part of the repo
      # checkout -- tests/e2e/ui/adsum.spec.ts (and playwright.config.ts's
      # conditional adsum webServer entry) skip themselves gracefully when
      # it's missing, but building it here gets that fast-lane coverage in
      # CI too. Needs an explicit TESTNET env: examples/adsum's committed
      # contract clients (src/contracts/{petitions,web_of_trust}.ts) build a
      # `Client` at module scope, and its default env (LOCAL) points at an
      # http:// RPC url that the stellar SDK's `allowHttp` guard rejects.
      - name: Build adsum example (staging clients, testnet env)
        run: npm run build
        working-directory: examples/adsum
        env:
          PUBLIC_STELLAR_NETWORK: TESTNET
          PUBLIC_STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          PUBLIC_STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      # adsum's own unit suite (vitest) — includes the claim-payload pin test
      # (the stop-ship protocol guarantee) — plus its eslint config, so a
      # regression there fails the PR gate instead of only showing up in a
      # local `npm test`/`npm run lint` run.
      - name: Unit tests (adsum)
        run: npm test
        working-directory: examples/adsum
      - name: Lint (adsum)
        run: npm run lint
        working-directory: examples/adsum
      - name: Fast UI e2e tier (shim — chromium/firefox/webkit)
        run: npx playwright test --grep @fast
      - name: Chromium CDP virtual-authenticator fidelity lane
        run: npx playwright test --project=chromium-cdp
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  zk-circuit-repro:
    name: ZK circuit artifact reproducibility (manual)
    runs-on: ubuntu-latest
    # Gate B (Task 7). workflow_dispatch-only, NOT a pull_request/push gate:
    # `just gen-zk-fixtures` (-> circuits/zk_recovery/scripts/gen_artifacts.sh)
    # hard-requires the EXACT pinned nargo 1.0.0-beta.18 + bb
    # 3.0.0-nightly.20260102 toolchain, which isn't in the standard runner
    # image and has to be fetched here via curl|bash from the noir-lang/noirup
    # and AztecProtocol/aztec-packages (bbup) installers on every run --
    # mirroring circuits/zk_recovery/scripts/Dockerfile's install commands.
    # That's a real nargo compile + bb prove of the depth-24 circuit each
    # time (slower than the fixture-based `bench-zk*` gates above) plus two
    # third-party curl|bash fetches from hosts we don't control -- both a
    # network-flakiness and a supply-chain surface too heavy/unreliable to put
    # in the way of every PR. So this job is manual: run it from the Actions
    # tab (or `gh workflow run test.yml`) after a deliberate circuit change,
    # to confirm the committed crates/integration-tests/fixtures/zk/ artifacts
    # (and their manifest.json) are still exactly reproducible from source. A
    # non-zero exit here means either an undeclared circuit/toolchain drift or
    # a genuinely non-deterministic bb output -- either way it needs a human
    # to look at the diff, not an auto-fail merge queue.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      # Fast, prebuilt-binary install (no compile-from-source) -- same action
      # the `contracts` job above uses.
      - name: Install just
        uses: taiki-e/install-action@just

      # Pinned exactly as circuits/zk_recovery/scripts/Dockerfile installs
      # them, and version-checked again by gen_artifacts.sh itself (it hard
      # -fails if `nargo --version` doesn't contain 1.0.0-beta.18).
      - name: Install nargo (pinned via noirup)
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
          "$HOME/.nargo/bin/noirup" -v 1.0.0-beta.18

      - name: Install bb (pinned via bbup)
        run: |
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/master/barretenberg/bbup/install | bash
          echo "$HOME/.bb" >> "$GITHUB_PATH"
          "$HOME/.bb/bbup" -nv 1.0.0-beta.18

      # Regenerates circuits/zk_recovery/target/{vk,proof,public_inputs} from
      # source, then re-stages them into
      # crates/integration-tests/fixtures/zk/ and rewrites its manifest.json
      # (see the `gen-zk-fixtures` recipe in justfile).
      - name: just gen-zk-fixtures
        run: just gen-zk-fixtures

      # Fails the job if regenerating from source produced anything different
      # from what's committed. Comparing the manifest (sha256 of each
      # artifact) rather than the binary artifacts directly gives a readable
      # diff instead of a binary-blob one.
      - name: Fail on fixture drift
        run: git diff --exit-code crates/integration-tests/fixtures/zk/manifest.json

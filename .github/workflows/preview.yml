name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/preview.yml'
      # The example-dApp preview (example-preview.yml) points its wallet at
      # THIS PR's N.nido.fyi — so a dApp-only PR still needs the wallet
      # preview deployed alongside.
      - 'examples/status-message-dapp/**'

permissions:
  contents: read
  pull-requests: write

env:
  PAGES_PROJECT: nido
  # "Example app" link points at THIS PR's example-dApp preview (deployed by
  # example-preview.yml to the mysoroban project's example-pr-<N> branch alias),
  # not the production GitHub Pages demo — so the wallet preview and the example
  # preview exercise each other. deploy.yml keeps the production URL.
  PUBLIC_EXAMPLE_DAPP_URL: "https://example-pr-${{ github.event.pull_request.number }}.mysoroban.pages.dev/"
  PUBLIC_GITHUB_REPOSITORY: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build workspace packages
        run: npm run build:packages

      - name: Build frontend
        env:
          # Gas abstraction via the self-hosted OZ Relayer (#72). SIM_SOURCE is
          # the relayer's public fund address (simulation-only tx source).
          PUBLIC_RELAYER_URL: https://nido.fly.dev
          PUBLIC_RELAYER_SIM_SOURCE: GAL42RUBXKQSVSJWBXFTBB4GFKMPQXA3SOJVGP6UMRJT2SGEIR63JFK2
          PUBLIC_RECOVERY_RELAY_URL: https://relay.nido.fyi
          # ZK-recovery preview: the `zk-recovery-m4` branch's preview uses the
          # factory-v2 preview pair (create_account_v2 genesis-insert, so ZK
          # enrollment actually works — the live v1 factory can't). Gated to
          # this branch so every OTHER PR preview stays on the production
          # factory. Remove once a real factory-v2 is the registered default.
          PUBLIC_ZK_PREVIEW: ${{ github.head_ref == 'zk-recovery-m4' && '1' || '' }}
        run: npx astro build --root ./packages/frontend

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy packages/frontend/dist/ \
            --project-name "$PAGES_PROJECT" \
            --branch "pr-${{ github.event.pull_request.number }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const previewUrl = `https://${prNum}.nido.fyi`;
            const body = `**Preview deployed!**\n\n${previewUrl}\n\nAccount URLs use numeric preview suffixes, for example \`<contract-address>--${prNum}.nido.fyi\`.`;

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed!')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }

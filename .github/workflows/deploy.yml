name: Deploy Production

on:
  push:
    branches: [main]

env:
  PAGES_PROJECT: nido
  PUBLIC_EXAMPLE_DAPP_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
  PUBLIC_GITHUB_REPOSITORY: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build workspace packages
        run: npm run build:packages

      - name: Build frontend
        env:
          # Gas abstraction via the self-hosted OZ Relayer (#72). SIM_SOURCE is
          # the relayer's public fund address (simulation-only tx source).
          PUBLIC_RELAYER_URL: https://nido.fly.dev
          PUBLIC_RELAYER_SIM_SOURCE: GAL42RUBXKQSVSJWBXFTBB4GFKMPQXA3SOJVGP6UMRJT2SGEIR63JFK2
          PUBLIC_RECOVERY_RELAY_URL: https://relay.nido.fyi
        run: npx astro build --root ./packages/frontend

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy packages/frontend/dist/ \
            --project-name "$PAGES_PROJECT" \
            --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Edge proxy for *.nido.fyi -> the nido Pages origin (PR-preview subdomain
      # rewrites + reserved dApp subdomains). Lives here, not its own repo, because
      # its origin and RESERVED_DAPP_SUBDOMAINS version with the frontend it fronts.
      # Requires the CF API token to include Workers Scripts:Edit (not just Pages).
      - name: Deploy nido.fyi proxy worker
        run: npx wrangler deploy --config frontend/worker-proxy-nido/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy recovery-relay worker
        run: npx wrangler deploy --config infra/recovery-relay/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

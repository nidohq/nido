app = "nido"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_PORT = "8090"
  METRICS_ENABLED = "false"
  REPOSITORY_STORAGE_TYPE = "redis"
  REDIS_KEY_PREFIX = "nido-relayer"
  # Redis is self-hosted as a separate Fly app (infra/relayer-redis), reached
  # over private 6PN networking — NOT managed Upstash. Upstash PAYG billed
  # per-op, and the relayer's always-on worker pool polls Redis continuously;
  # that ran up the bill until Upstash throttled bandwidth and every /relay call
  # failed. A self-hosted Redis is flat-cost. The base relayer image is
  # Wolfi-glibc with only the Chainguard apk repo (no `redis` package), so Redis
  # can't live in this container — hence a sibling app. To migrate off Upstash,
  # `fly secrets unset REDIS_URL` so this plain-env value wins (no password —
  # the 6PN address is private to the org and Redis is not publicly exposed).
  REDIS_URL = "redis://nido-redis.internal:6379"
  # Trim the per-op / connection overhead that made the polling expensive: a
  # small pool means fewer idle connection heartbeats (this relayer is
  # low-traffic), and short transaction expiry keeps the Redis dataset tiny.
  REDIS_POOL_MAX_SIZE = "10"
  TRANSACTION_EXPIRATION_HOURS = "6"
  STELLAR_NETWORK = "testnet"
  FUND_RELAYER_ID = "channels-fund"
  RATE_LIMIT_REQUESTS_PER_SECOND = "20"
  RATE_LIMIT_BURST_SIZE = "60"
  # Hard ceiling on fund-account fee spend. Without FEE_LIMIT the plugin's fee
  # tracking is DISABLED entirely. Caddy stamps one shared x-api-key on every
  # request, so this is a single global budget (100 XLM/day), not per-user —
  # it bounds a drain to a recoverable daily cost instead of the whole fund.
  # Per-client fairness needs per-client keys forwarded through Caddy first.
  FEE_LIMIT = "1000000000"
  FEE_RESET_PERIOD_SECONDS = "86400"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/v1/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
